name: Build Redis (Release + Sanitizers)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release
            artifact: redis-release

          - name: asan-lsan
            artifact: redis-asan-lsan

          - name: asan-ubsan
            artifact: redis-asan-ubsan

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            clang \
            llvm \
            lld \
            git \
            make \
            cmake \
            ninja-build \
            pkg-config \
            tcl \
            wget \
            curl \
            zip \
            unzip \
            python3 \
            python3-pip \
            libssl-dev \
            libc6-dev

      - name: Show compiler versions
        run: |
          clang --version
          gcc --version
          make --version

      - name: Clone latest Redis
        run: |
          git clone --depth=1 --branch unstable https://github.com/redis/redis.git redis-src

          cd redis-src

          echo "Commit:"
          git rev-parse HEAD

      - name: Clean source tree
        working-directory: redis-src
        run: |
          git clean -xfd
          make distclean || true

      - name: Build Redis
        working-directory: redis-src
        env:
          CC: clang
        run: |
          set -euxo pipefail

          make distclean || true

          if [ "${{ matrix.name }}" = "release" ]; then

            make -j"$(nproc)" \
              MALLOC=libc \
              BUILD_TLS=yes \
              USE_SYSTEMD=no \
              OPTIMIZATION="-O2"

            BUILD_FLAGS="Release"

          elif [ "${{ matrix.name }}" = "asan-lsan" ]; then

            make -j"$(nproc)" \
              MALLOC=libc \
              BUILD_TLS=yes \
              USE_SYSTEMD=no \
              OPTIMIZATION="-O1" \
              CFLAGS="-g -O1 -fno-omit-frame-pointer -fsanitize=address" \
              LDFLAGS="-fsanitize=address"

            BUILD_FLAGS="ASan + LeakSanitizer"

          else

            make -j"$(nproc)" \
              MALLOC=libc \
              BUILD_TLS=yes \
              USE_SYSTEMD=no \
              OPTIMIZATION="-O1" \
              CFLAGS="-g -O1 -fno-omit-frame-pointer -fsanitize=address,undefined" \
              LDFLAGS="-fsanitize=address,undefined"

            BUILD_FLAGS="ASan + UBSan"

          fi

          echo "$BUILD_FLAGS" > ../build_flags.txt

      - name: Verify binaries
        working-directory: redis-src/src
        run: |
          file redis-server
          file redis-cli

          ./redis-server --version
          ./redis-cli --version

      - name: Prepare package
        run: |
          mkdir -p package

          cp -a redis-src package/source

          rm -rf \
            package/source/.git \
            package/source/.github

          cat > package/BUILD_INFO.txt <<EOF
          Redis Build

          Configuration:
          $(cat build_flags.txt)

          Commit:
          $(cd redis-src && git rev-parse HEAD)

          Date:
          $(date -u)

          Compiler:
          $(clang --version | head -n1)
          EOF

      - name: Archive build
        run: |
          cd package
          zip -9 -r ../${{ matrix.artifact }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error
          retention-days: 30
