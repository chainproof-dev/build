name: Build latest V8 security-research matrix

on:
  workflow_dispatch:
    inputs:
      v8_ref:
        description: "V8 Git ref or full 40-character commit SHA"
        required: true
        default: "refs/heads/main"
        type: string
      keep_github_backup:
        description: "Also retain each tar.gz as a GitHub Actions artifact for 3 days"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: v8-security-build-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

env:
  V8_REMOTE: https://chromium.googlesource.com/v8/v8.git
  DEPOT_TOOLS_REMOTE: https://chromium.googlesource.com/chromium/tools/depot_tools.git

jobs:
  resolve-v8:
    name: Resolve one exact V8 revision
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      revision: ${{ steps.resolve.outputs.revision }}
      short_revision: ${{ steps.resolve.outputs.short_revision }}
    steps:
      - name: Resolve requested ref
        id: resolve
        shell: bash
        env:
          REQUESTED_REF: ${{ inputs.v8_ref }}
        run: |
          set -Eeuo pipefail

          if [[ "$REQUESTED_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            revision="${REQUESTED_REF,,}"
            # Confirm that the object exists remotely when the server allows SHA fetches.
            git ls-remote "$V8_REMOTE" | grep -qi "$revision" || true
          else
            revision="$(git ls-remote "$V8_REMOTE" "$REQUESTED_REF" | awk 'NR == 1 {print $1}')"
          fi

          if [[ ! "$revision" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Could not resolve V8 ref: $REQUESTED_REF" >&2
            exit 1
          fi

          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "short_revision=${revision:0:12}" >> "$GITHUB_OUTPUT"
          {
            echo "## V8 revision"
            echo
            echo "All 11 builds are pinned to \`$revision\`."
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: ${{ matrix.order }} · ${{ matrix.id }}
    needs: resolve-v8
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - order: "01"
            id: x64-release
            runner: ubuntu-24.04
            arch: x64
          - order: "02"
            id: x64-asan
            runner: ubuntu-24.04
            arch: x64
          - order: "03"
            id: x64-checks
            runner: ubuntu-24.04
            arch: x64
          - order: "04"
            id: x64-ubsan
            runner: ubuntu-24.04
            arch: x64
          - order: "05"
            id: x64-tsan
            runner: ubuntu-24.04
            arch: x64
          - order: "06"
            id: x64-fuzzilli
            runner: ubuntu-24.04
            arch: x64
          - order: "07"
            id: x64-sandbox-release
            runner: ubuntu-24.04
            arch: x64
          - order: "08"
            id: x64-sandbox-asan
            runner: ubuntu-24.04
            arch: x64
          - order: "09"
            id: arm64-release
            runner: ubuntu-24.04-arm
            arch: arm64
          - order: "10"
            id: arm64-asan
            runner: ubuntu-24.04-arm
            arch: arm64
          - order: "11"
            id: arm64-sandbox-release
            runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    env:
      BUILD_ID: ${{ matrix.id }}
      TARGET_CPU: ${{ matrix.arch }}
      V8_REVISION: ${{ needs.resolve-v8.outputs.revision }}
      V8_SHORT_REVISION: ${{ needs.resolve-v8.outputs.short_revision }}
      DEPOT_TOOLS: ${{ runner.temp }}/depot_tools
      CHECKOUT_ROOT: ${{ runner.temp }}/v8-checkout
      V8_DIR: ${{ runner.temp }}/v8-checkout/v8
      OUT_DIR: ${{ runner.temp }}/v8-checkout/v8/out/security-build
      PACKAGE_ROOT: ${{ runner.temp }}/v8-package

    steps:
      - name: Show runner resources and reclaim disk
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "Runner: $RUNNER_NAME"
          uname -a
          echo "CPUs: $(nproc)"
          free -h || true
          df -h

          # Standard hosted runners expose limited free SSD space. These SDKs are
          # not used by V8 and are safe to remove in this disposable VM.
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/share/boost \
            /opt/hostedtoolcache/CodeQL \
            2>/dev/null || true
          sudo docker system prune --all --force --volumes 2>/dev/null || true
          sudo apt-get clean
          df -h

      - name: Install host packages
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            file \
            git \
            lsb-release \
            ninja-build \
            pigz \
            pkg-config \
            python3 \
            tar \
            unzip \
            xz-utils

      - name: Install current depot_tools
        shell: bash
        run: |
          set -Eeuo pipefail
          git clone --depth=1 "$DEPOT_TOOLS_REMOTE" "$DEPOT_TOOLS"
          echo "$DEPOT_TOOLS" >> "$GITHUB_PATH"
          export PATH="$DEPOT_TOOLS:$PATH"
          gclient --version
          gn --version
          autoninja --version

      - name: Fetch V8 and synchronize exact dependencies
        shell: bash
        run: |
          set -Eeuo pipefail
          export PATH="$DEPOT_TOOLS:$PATH"
          mkdir -p "$CHECKOUT_ROOT"
          cd "$CHECKOUT_ROOT"

          # --no-history saves substantial disk. The fallback keeps this workflow
          # compatible if depot_tools changes that option in the future.
          if ! fetch --nohooks --no-history v8; then
            rm -rf "$CHECKOUT_ROOT/v8" "$CHECKOUT_ROOT/.gclient" "$CHECKOUT_ROOT/.gclient_entries"
            fetch --nohooks v8
          fi

          cd "$V8_DIR"
          if ! git cat-file -e "$V8_REVISION^{commit}" 2>/dev/null; then
            git fetch --depth=1 origin "$V8_REVISION"
          fi
          git checkout --detach "$V8_REVISION"

          if ! gclient sync \
              --delete_unversioned_trees \
              --force \
              --reset \
              --no-history \
              --revision "v8@$V8_REVISION"; then
            gclient sync \
              --delete_unversioned_trees \
              --force \
              --reset \
              --revision "v8@$V8_REVISION"
          fi

          actual_revision="$(git rev-parse HEAD)"
          if [[ "$actual_revision" != "$V8_REVISION" ]]; then
            echo "Revision mismatch: wanted $V8_REVISION, got $actual_revision" >&2
            exit 1
          fi

          git status --short
          df -h

      - name: Install V8 Linux build dependencies and sysroot
        shell: bash
        run: |
          set -Eeuo pipefail
          export PATH="$DEPOT_TOOLS:$PATH"
          cd "$V8_DIR"

          sudo env DEBIAN_FRONTEND=noninteractive \
            ./build/install-build-deps.sh --no-prompt

          if [[ "$TARGET_CPU" == "arm64" ]]; then
            sysroot_arch=arm64
          else
            sysroot_arch=amd64
          fi
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch="$sysroot_arch"

      - name: Generate validated args.gn
        shell: bash
        run: |
          set -Eeuo pipefail
          export PATH="$DEPOT_TOOLS:$PATH"
          cd "$V8_DIR"
          mkdir -p "$OUT_DIR"

          is_asan=false
          is_lsan=false
          is_tsan=false
          is_ubsan=false
          is_ubsan_no_recover=false
          is_ubsan_vptr=false
          dcheck_always_on=false
          v8_static_library=false
          v8_fuzzilli=false
          memory_corruption_api=false
          extra_args=""

          case "$BUILD_ID" in
            x64-release|arm64-release)
              ;;
            x64-asan)
              is_asan=true
              is_lsan=true
              ;;
            arm64-asan)
              # This matches V8's current native arm64 ASAN bot: ASAN without LSan.
              is_asan=true
              ;;
            x64-checks)
              dcheck_always_on=true
              extra_args='v8_enable_verification_features = true
          v8_enable_slow_dchecks = true
          v8_enable_verify_heap = true
          v8_enable_verify_write_barriers = true
          v8_enable_verify_csa = true
          v8_enable_backtrace = true
          v8_enable_object_print = true
          v8_enable_disassembler = true'
              ;;
            x64-ubsan)
              is_ubsan=true
              is_ubsan_no_recover=true
              is_ubsan_vptr=true
              ;;
            x64-tsan)
              is_tsan=true
              ;;
            x64-fuzzilli)
              dcheck_always_on=true
              v8_static_library=true
              v8_fuzzilli=true
              extra_args='v8_enable_verify_heap = true
          v8_enable_partition_alloc = false
          sanitizer_coverage_flags = "trace-pc-guard"'
              ;;
            x64-sandbox-release|arm64-sandbox-release)
              memory_corruption_api=true
              ;;
            x64-sandbox-asan)
              is_asan=true
              # Required: V8 rejects memory_corruption_api + LSan because both use ptrace.
              is_lsan=false
              memory_corruption_api=true
              ;;
            *)
              echo "Unknown build id: $BUILD_ID" >&2
              exit 1
              ;;
          esac

          cat > "$OUT_DIR/args.gn" <<EOF
          target_os = "linux"
          target_cpu = "$TARGET_CPU"

          is_debug = false
          is_official_build = false
          dcheck_always_on = $dcheck_always_on
          is_component_build = false
          is_clang = true
          treat_warnings_as_errors = false

          is_asan = $is_asan
          is_lsan = $is_lsan
          is_tsan = $is_tsan
          is_ubsan = $is_ubsan
          is_ubsan_no_recover = $is_ubsan_no_recover
          is_ubsan_vptr = $is_ubsan_vptr

          symbol_level = 1
          v8_symbol_level = 2

          use_custom_libcxx = true
          use_safe_libcxx = true

          v8_enable_sandbox = true
          v8_enable_memory_corruption_api = $memory_corruption_api
          v8_static_library = $v8_static_library
          v8_fuzzilli = $v8_fuzzilli
          EOF

          if [[ -n "$extra_args" ]]; then
            printf '%s\n' "$extra_args" >> "$OUT_DIR/args.gn"
          fi

          sed -i 's/^          //' "$OUT_DIR/args.gn"
          echo "===== args.gn for $BUILD_ID ====="
          cat "$OUT_DIR/args.gn"

          # This turns stale or misspelled GN variables into hard failures.
          gn gen "$OUT_DIR" --fail-on-unused-args
          gn args "$OUT_DIR" --list --short > "$OUT_DIR/effective-args.txt"
          gn desc "$OUT_DIR" //:d8 runtime_deps > "$OUT_DIR/d8-runtime-deps.txt" || true

      - name: Build d8 with every available CPU
        shell: bash
        run: |
          set -Eeuo pipefail
          export PATH="$DEPOT_TOOLS:$PATH"
          cd "$V8_DIR"

          jobs="$(nproc)"
          echo "Building $BUILD_ID with $jobs Ninja workers"
          autoninja -C "$OUT_DIR" -j "$jobs" d8
          df -h

      - name: Smoke-test the produced runtime
        shell: bash
        run: |
          set -Eeuo pipefail
          cd "$V8_DIR"

          export ASAN_OPTIONS="abort_on_error=1:detect_leaks=0:symbolize=1"
          export LSAN_OPTIONS="detect_leaks=0"
          export TSAN_OPTIONS="halt_on_error=1:history_size=7"
          export UBSAN_OPTIONS="halt_on_error=1:print_stacktrace=1"

          cat > "$RUNNER_TEMP/v8-smoke.js" <<'JS'
          print("V8 version: " + version());
          print("architecture smoke test passed");
          JS

          "$OUT_DIR/d8" "$RUNNER_TEMP/v8-smoke.js"
          "$OUT_DIR/d8" --run-as-security-poc "$RUNNER_TEMP/v8-smoke.js"

          if [[ "$BUILD_ID" == *sandbox* ]]; then
            cat > "$RUNNER_TEMP/v8-sandbox-smoke.js" <<'JS'
          if (typeof Sandbox !== "object") {
            throw new Error("Sandbox memory-corruption API was not exposed");
          }
          print("sandbox security-poc mode passed");
          JS
            "$OUT_DIR/d8" --run-as-sandbox-security-poc "$RUNNER_TEMP/v8-sandbox-smoke.js"
          fi

      - name: Package portable build bundle
        id: package
        shell: bash
        run: |
          set -Eeuo pipefail
          export PATH="$DEPOT_TOOLS:$PATH"
          cd "$V8_DIR"

          stage="$PACKAGE_ROOT/v8-$BUILD_ID-$V8_SHORT_REVISION"
          archive="$RUNNER_TEMP/v8-$BUILD_ID-$V8_SHORT_REVISION-linux-$TARGET_CPU.tar.gz"
          mkdir -p "$stage"

          # Keep the runtime, startup data, shared runtime libraries if any, and
          # the exact configuration needed to reproduce the build.
          find "$OUT_DIR" -maxdepth 1 -type f \
            \( -name 'd8' \
               -o -name '*.bin' \
               -o -name '*.dat' \
               -o -name '*.json' \
               -o -name '*.so' \
               -o -name '*.so.*' \) \
            -exec cp -a {} "$stage/" \;

          cp "$OUT_DIR/args.gn" "$stage/args.gn"
          cp "$OUT_DIR/effective-args.txt" "$stage/effective-args.txt"
          cp "$OUT_DIR/d8-runtime-deps.txt" "$stage/d8-runtime-deps.txt" || true

          {
            echo "build_id=$BUILD_ID"
            echo "v8_revision=$V8_REVISION"
            echo "target_os=linux"
            echo "target_cpu=$TARGET_CPU"
            echo "runner=$RUNNER_NAME"
            echo "runner_arch=$RUNNER_ARCH"
            echo "nproc=$(nproc)"
            echo "built_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "depot_tools_revision=$(git -C "$DEPOT_TOOLS" rev-parse HEAD)"
            echo "clang_version=$($V8_DIR/third_party/llvm-build/Release+Asserts/bin/clang --version | head -1)"
          } > "$stage/BUILD_INFO.txt"

          file "$stage/d8" > "$stage/file-d8.txt"
          ldd "$stage/d8" > "$stage/ldd-d8.txt" 2>&1 || true
          "$stage/d8" --version > "$stage/d8-version.txt" 2>&1 || true

          (
            cd "$stage"
            find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          )

          tar -C "$PACKAGE_ROOT" -cf - "$(basename "$stage")" \
            | pigz -1 -p "$(nproc)" > "$archive"

          test -s "$archive"
          sha256sum "$archive"
          ls -lh "$archive"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "archive_name=$(basename "$archive")" >> "$GITHUB_OUTPUT"

      - name: Upload archive to sendit.sh
        id: sendit
        shell: bash
        env:
          ARCHIVE: ${{ steps.package.outputs.archive }}
          ARCHIVE_NAME: ${{ steps.package.outputs.archive_name }}
        run: |
          set -Eeuo pipefail

          response="$(curl \
            --fail-with-body \
            --location \
            --retry 5 \
            --retry-all-errors \
            --connect-timeout 30 \
            --upload-file "$ARCHIVE" \
            https://sendit.sh)"

          printf '%s\n' "$response"
          url="$(printf '%s\n' "$response" | grep -Eo 'https?://[^[:space:]<>]+' | tail -n 1)"
          if [[ -z "$url" ]]; then
            echo "sendit.sh did not return a download URL" >&2
            exit 1
          fi

          link_file="$RUNNER_TEMP/sendit-link-$BUILD_ID.txt"
          printf '%s\t%s\t%s\n' "$BUILD_ID" "$ARCHIVE_NAME" "$url" > "$link_file"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "link_file=$link_file" >> "$GITHUB_OUTPUT"

          {
            echo "## $BUILD_ID"
            echo
            echo "- V8 revision: \`$V8_REVISION\`"
            echo "- Archive: \`$ARCHIVE_NAME\`"
            echo "- Download: $url"
            echo "- SHA-256: \`$(sha256sum "$ARCHIVE" | awk '{print $1}')\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Save sendit link for final summary
        uses: actions/upload-artifact@v4
        with:
          name: sendit-link-${{ matrix.order }}-${{ matrix.id }}
          path: ${{ steps.sendit.outputs.link_file }}
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

      - name: Optional GitHub artifact backup
        if: ${{ inputs.keep_github_backup }}
        uses: actions/upload-artifact@v4
        with:
          name: v8-${{ matrix.id }}-${{ needs.resolve-v8.outputs.short_revision }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

  collect-links:
    name: Collect all download links
    needs: [resolve-v8, build]
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download link records
        uses: actions/download-artifact@v4
        with:
          pattern: sendit-link-*
          path: links
          merge-multiple: true

      - name: Create final link list
        shell: bash
        env:
          V8_REVISION: ${{ needs.resolve-v8.outputs.revision }}
        run: |
          set -Eeuo pipefail
          shopt -s nullglob
          files=(links/sendit-link-*.txt)

          {
            echo "# V8 security-research build links"
            echo
            echo "V8 revision: \`$V8_REVISION\`"
            echo
            echo "| Build | Archive | Download |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          : > all-sendit-links.txt
          for file in "${files[@]}"; do
            IFS=$'\t' read -r build archive url < "$file"
            printf '%s\t%s\t%s\n' "$build" "$archive" "$url" >> all-sendit-links.txt
            printf '| `%s` | `%s` | %s |\n' "$build" "$archive" "$url" >> "$GITHUB_STEP_SUMMARY"
          done

          if (( ${#files[@]} != 11 )); then
            echo "Expected 11 successful uploads, found ${#files[@]}." >&2
            exit 1
          fi

      - name: Retain combined link list
        uses: actions/upload-artifact@v4
        with:
          name: all-sendit-links-${{ needs.resolve-v8.outputs.short_revision }}
          path: all-sendit-links.txt
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
