name: Build Redis (Release + Sanitizers)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release
            artifact: redis-release
            cflags: "-O2 -g"
            ldflags: ""

          - name: asan-lsan
            artifact: redis-asan-lsan
            cflags: "-O1 -g -fno-omit-frame-pointer -fsanitize=address"
            ldflags: "-fsanitize=address"

          - name: asan-ubsan
            artifact: redis-asan-ubsan
            cflags: "-O1 -g -fno-omit-frame-pointer -fsanitize=address,undefined"
            ldflags: "-fsanitize=address,undefined"

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            clang \
            llvm \
            lld \
            git \
            make \
            cmake \
            ninja-build \
            pkg-config \
            tcl \
            wget \
            curl \
            ca-certificates \
            zip \
            unzip \
            tar \
            python3 \
            python3-pip \
            libssl-dev \
            libsystemd-dev \
            libc6-dev

      - name: Show compiler versions
        run: |
          clang --version
          gcc --version
          make --version

      - name: Clone latest Redis
        run: |
          git clone https://github.com/redis/redis.git redis-src
          cd redis-src
          git checkout unstable

          echo "Commit:"
          git rev-parse HEAD

      - name: Clean source tree
        working-directory: redis-src
        run: |
          make distclean || true

      - name: Build Redis
        working-directory: redis-src
        env:
          CC: clang
          CFLAGS: ${{ matrix.cflags }}
          LDFLAGS: ${{ matrix.ldflags }}
        run: |
          make -j$(nproc)

      - name: Verify binaries
        working-directory: redis-src/src
        run: |
          file redis-server
          file redis-cli

          ./redis-server --version
          ./redis-cli --version

      - name: Prepare package
        run: |
          mkdir package

          cp -a redis-src/src package/src
          cp -a redis-src/redis.conf package/
          cp -a redis-src/sentinel.conf package/
          cp -a redis-src/COPYING package/

          cat > package/BUILD_INFO.txt <<EOF
          Redis Build

          Configuration : ${{ matrix.name }}

          Commit:
          $(cd redis-src && git rev-parse HEAD)

          Date:
          $(date -u)

          Compiler:
          $(clang --version | head -n1)

          CFLAGS:
          ${{ matrix.cflags }}

          LDFLAGS:
          ${{ matrix.ldflags }}
          EOF

      - name: Archive build
        run: |
          zip -r "${{ matrix.artifact }}.zip" package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          if-no-files-found: error
          retention-days: 30
